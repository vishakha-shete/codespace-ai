apiVersion: apps/v1
kind: Deployment

metadata:
  name: router-deployment
  labels:
    app: router

spec:
  replicas: 1

  selector:
    matchLabels:
      app: router

  template:
    metadata:
      labels:
        app: router

    spec:
      containers:
        - name: router-server
          image: router:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "20m"
              memory: "250Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"

          livenessProbe:
            httpGet:
              path: /api/status/healthz
              port: 3000
            initialDelaySeconds: 90
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /api/status/readyz
              port: 3000
            initialDelaySeconds: 30
            timeoutSeconds: 10